<!DOCTYPE html>
<html lang="en">
<head>
    <!--meta labels are like informations about the website. People can find our website more easily thanks to the meta labels.-->
    <!--meta labels will be written inside of the head block.-->

    <!--description of the website-->
    <meta name="description" content="website that is for practicing meta labels.">

    <!--keywords for the website-->
    <meta name="keywords" content="meta, labels, html, practice">

    <!--author of the website-->
    <meta name="author" content="NecmettinG">

    <!--charset is the character set of the website. UTF-8 is the most common character set. Includes turkish letters as well.-->
    <meta charset="UTF-8">

    <!--viewport for responsive design. The size and design of the website are adjusted according to device resolution and type. (phone etc.)-->
    <!--width=device-width is adjusting the width according to device. initial-scale=1.0 is the zoom scale of the website.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--refreshing the page every 10 seconds. This one is special.-->
    <meta http-equiv="refresh" content="10">

    <title>Meta labels</title>
</head>
<body>
    
</body>
</html>
