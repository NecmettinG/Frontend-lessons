<!--If you type "!" and press enter, vscode automatically creates necessary elements for a html document.-->
<!--With hyperlinks, we are creating links for a particular text, image or videos.-->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>

    <body>
    
        <!--This is a hyperlink element. It is used to create a link to another page or website.-->
        <!--href parameter is redirecting us to a particular website or html file-->
        <!--The target parameter is used to specify where the linked document will open.
        _blank means that the link will open in a new tab.-->
        <a href="https://www.youtube.com/"
        target="_blank"
        title="goes to YouTube"> <!--title parameter is used to show a tooltip when we hover over the link. (The text near of the cursor.)-->
            
            YouTube <!--This is the text that will be shown on our website. When we click on this text, 
            we will be redirected to the website that we specified in href parameter.-->
        </a>

        <br> <!--This is a line break element. It is used to create a new line. There will be an empty line between two hyperlinks.-->
        
        <!--This is another hyperlink. It will redirect us to our first website that we created.-->
        <a href="creating-website.html"
        target="_blank"
        title="goes to our first website">

            My first website 
        </a>

    </body>
</html>
