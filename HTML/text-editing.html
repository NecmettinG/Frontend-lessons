<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Text Editing</title>
    </head>

    <body>
        
        <p>This is a normal text.</p> <!--This is a paragraph element. It is used to create a block of text.-->
        <p>This is a <b>bold</b> text.</p> <!--This is a bold text. The b element is used to make the text bold.-->
        <p>This is an <i>italic</i> text.</p> <!--This is an italic text. The i element is used to make the text italic.-->
        <p>This is a <big>big</big> text.</p> <!--This is a big text. The big element is used to make the text bigger.-->
        <p>This is a <small>small</small> text.</p> <!--This is a small text. The small element is used to make the text smaller.-->
        <p>This is a <sub>sub-symbol</sub> text.</p> <!--This is a sub-symbol text. The sub element is used to make the text subscript.-->
        <p>This is a <sup>super-symbol</sup> text.</p> <!--This is a super-symbol text. The sup element is used to make the text superscript.-->
        <p>This is an <ins>underlined</ins> text.</p> <!--This is an underlined text. The ins element is used to underline the text.-->
        <p>This is a <del>strikeout</del> text.</p> <!--This is a strikeout text. The del element is used to strikeout the text.-->
        <p>This is a <mark>phosphor marked</mark> text.</p> <!--This is a phosphor marked text. The mark element is used to highlight the text.-->
        <p>This is a <code>code</code> text.</p> <!--This is a code text. The code element is used to display code snippets.-->

    </body>
</html>
