<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Classical Music</title>
    </head>

    <body>
        
        <!--audio element is for audios-->
        <!--src parameter is used to specify the source of the audio file. I created a directory called musics and put an audio file inside of it.-->
        <!--controls parameter is used to show the audio controls such as play, pause, volume etc.-->
        <!--autoplay parameter is used to play the audio automatically when the page is loaded.-->
        <!--muted parameter is used to mute the audio by default.-->
        <!--loop parameter is used to play the audio in a loop.-->
        <audio src="musics/Chopin - Nocturne op.9 No.2.mp3" controls autoplay muted loop></audio>

    </body>
</html>
