<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>picture website</title> <!--This is the title of our website. It will be shown on the top of the browser tab.-->
    </head>

    <body>
        
        <!--Whenever we click to picture, we will be redirected to an instagram video of rigby the cat in a new tab.-->
        <a href="https://www.instagram.com/reel/DLEBaLrobhh/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
        target="_blank">

            <!--We declared a picture as a hyperlink element.-->
            <!--img element is used for images-->
            <!--src parameter is used to specify the source of the image. I created a directory called pictures and put a picture inside of it.-->
            <!--width and height parameters are used to specify the size of the image.-->
            <!--alt parameter is used to specify an alternative text for the image. It will be shown if the image cannot be displayed.-->
            <!--title parameter is used to specify a tooltip for the image. It will be shown when we hover over the image.-->
            <img src="pictures/rigby.jpg" width="1080px" height="1350px" alt="Rigby the fainting goat" title="Rigby the fainting goat">
        </a>

    </body>
</html>
