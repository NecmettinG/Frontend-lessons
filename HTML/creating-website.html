<!DOCTYPE html>
<html> <!--we created our html block-->
    <!--In html block, we have two fundamental blocks. head and body.-->

    <!--head block contains information about website. Such as title, icon, size and supported language etc.-->
    <head> 

        <!--This is the title of our website. It will be shown on the top of the browser tab.-->
        <title>
            Welcome to my first website! 
        </title>
    </head>

    <!--body block contains elements that we want to show on our website. Such as texts, pictures, buttons and so on.-->
    <body>
        
        <!--This is a header element. It is used to show main title of our website (on the website of course!).-->
        <!--There are 6 different header elements. h1, h2, h3, h4, h5 and h6. h1 is the biggest one and h6 is the smallest one.-->
        <h1>
            Hello World! <!--It will be written "Hello World!" with big size.-->
        </h1>

        <br> <!--This is a line break element. It is used to create a new line. There will be an empty line between h1 and h2.-->

        <h2>
            This is my first website! <!--It will be written "This is my first website!" with smaller size than h1.-->
        </h2>

        <hr> <!--This is a horizontal rule element. It is used to create a line between elements. A line will appear under of h2.-->
        
        I am learning HTML. <!--This is a text that will be shown on our website.-->

        <p>
            I am a beginner in frontend. <!--This is a paragraph element. It is used to show a block of text.-->
        </p>

    </body>
</html>
