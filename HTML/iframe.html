<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iframe</title>
</head>

<body>

    <!--Iframe is used whenever we want to show another website inside of our website. It might be used by hackers to steal our data as well.
    Most of the big websites closed this feature because frauds can show their own websites as a particular big website. 
    But wikipedia is an exception.
    Adds-commercials also using Iframe.-->

    <!--src parameter takes the url of the website that will take place as Iframe. src also can take the path of our html files.-->
    <!--frameborder parameter is for adding borders to Iframe.-->
    <!--width and height is for adjusting the size of the Iframe.-->
    <iframe src="https://tr.wikipedia.org/wiki/Anasayfa" frameborder="1" width="600" height="600"></iframe>

    <iframe src="add.html" frameborder="0" width="600" height="100"></iframe>

    <!--We can also use our own html files as Iframes.-->
    
</body>
</html>
