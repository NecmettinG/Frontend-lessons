<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Span vs Div</title>
</head>

<body>
    <!--We used css property to change the background color for better understanding the difference between div and span.-->

    <div style="background-color: blue;">This is a div.</div> <!--div takes a whole row in size.-->
    <!--divs are mostly used in navigation bars. (texts that are on the top of the website, like main page, about us, account etc.)-->
    <!--Paragraphs (p) also take whole row in size and they are called block elements.-->

    <span style="background-color: green">This is a span.</span> <!--span takes only the space it needs. Equals to text's length.-->
    <!--spans are mostly used in texts, buttons etc. Like in the middle of a paragraph.-->
    
    <!-- The <section> element is a semantic(anlamsal) block-level element used to group related content, like a chapter or an "About" area. -->
    <section style="background-color: lightcoral; margin-top: 15px;">
        <h2>About Section Example</h2>
        <p>This content is grouped inside a section tag. Just like a div, it takes up the full width, but it provides better meaning (semantics) to the structure of the document.</p>
    </section>

</body>
</html>
